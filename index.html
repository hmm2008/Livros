<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Livros</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            stone: {
              50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4',
              300: '#d6d3d1', 400: '#a8a29e', 500: '#78716c',
              800: '#292524', 900: '#1c1917',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-stone-50 text-stone-800 antialiased min-h-screen">

  <!-- Cabeçalho de Navegação -->
  <nav class="bg-white border-b border-stone-200 sticky top-0 z-10 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Título responsivo: texto menor no telemóvel para não cortar -->
        <h1 class="text-lg sm:text-xl font-medium text-stone-900 tracking-wide">CATÁLOGO DE LIVROS</h1>
        
        <!-- Botões de Separador -->
        <div class="flex space-x-2 sm:space-x-4">
          <button onclick="mudarSeparador('colecao')" id="tab-colecao" class="px-3 py-2 text-sm sm:text-base font-medium border-b-2 border-stone-900 text-stone-900 transition-colors">A Minha Coleção</button>
          <button onclick="mudarSeparador('adicionar')" id="tab-adicionar" class="px-3 py-2 text-sm sm:text-base font-medium border-b-2 border-transparent text-stone-500 hover:text-stone-700 transition-colors">Novo Registo</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Contentor Principal -->
  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- Alertas Globais -->
    <div id="alertBox" class="hidden mb-6 p-4 rounded-md text-sm text-center font-medium transition-all duration-300"></div>

    <!-- SEPARADOR: Coleção (Listagem) -->
    <section id="sec-colecao" class="block">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-light text-stone-800">Livros Registados</h2>
        <button onclick="carregarColecao()" class="p-2 text-stone-500 hover:text-stone-900 transition-colors" title="Atualizar dados">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
      </div>
      
      <!-- Indicador de Carregamento da Grelha -->
      <div id="loadingGrid" class="py-12 flex flex-col items-center justify-center text-stone-400">
        <svg class="animate-spin h-8 w-8 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <p>A sincronizar com a folha de cálculo...</p>
      </div>

      <!-- Grelha de Livros -->
      <div id="grelhaLivros" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Os cartões de livros entram aqui via JavaScript -->
      </div>
      
      <!-- Mensagem de Coleção Vazia -->
      <div id="emptyState" class="hidden py-12 text-center border-2 border-dashed border-stone-200 rounded-xl">
        <p class="text-stone-500 mb-4">Ainda não tens livros na tua coleção.</p>
        <button onclick="mudarSeparador('adicionar')" class="text-stone-900 font-medium hover:underline">Adicionar o primeiro livro</button>
      </div>
    </section>

    <!-- SEPARADOR: Adicionar Novo Livro -->
    <section id="sec-adicionar" class="hidden max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-stone-200 p-6 sm:p-8">
      
      <div class="mb-8 p-5 bg-stone-50 rounded-lg border border-stone-100 flex flex-col sm:flex-row gap-4 items-end">
        <div class="w-full">
          <label for="isbn" class="block text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Código ISBN (13 Dígitos)</label>
          <input type="text" id="isbn" name="isbn" placeholder="Ex: 9789720000000" class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-stone-400 outline-none transition-colors shadow-sm">
        </div>
        <button type="button" id="btnPesquisar" onclick="acionarPesquisa()" class="w-full sm:w-auto px-6 py-2 bg-stone-800 text-white rounded-md hover:bg-stone-700 transition-colors shadow-sm font-medium flex items-center justify-center gap-2 whitespace-nowrap">
          <span>Pesquisar</span>
          <svg id="spinnerPesquisa" class="hidden animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
      </div>

      <form id="formLivro" class="space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div class="sm:col-span-2">
            <label for="titulo" class="block text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Título do Livro *</label>
            <input type="text" id="titulo" name="titulo" required class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-stone-400 outline-none transition-colors shadow-sm">
          </div>
          <div>
            <label for="autor" class="block text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Autor</label>
            <input type="text" id="autor" name="autor" class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-stone-400 outline-none transition-colors shadow-sm">
          </div>
          <div>
            <label for="editora" class="block text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Editora</label>
            <input type="text" id="editora" name="editora" class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-stone-400 outline-none transition-colors shadow-sm">
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <div>
            <label for="preco" class="block text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Preço</label>
            <input type="text" id="preco" name="preco" class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-stone-400 outline-none transition-colors shadow-sm">
          </div>
          <div>
            <label for="genero" class="block text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Género</label>
            <select id="genero" name="genero" class="w-full px-4 py-2 border border-stone-300 rounded-md bg-white focus:ring-2 focus:ring-stone-400 outline-none transition-colors shadow-sm">
              <option value="">Selecione...</option>
              <option value="Ficção">Ficção</option>
              <option value="Biografia">Biografia</option>
              <option value="Técnico">Técnico</option>
              <option value="História">História</option>
              <option value="Romance">Romance</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
          <div>
            <label for="estado" class="block text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Estado</label>
            <select id="estado" name="estado" class="w-full px-4 py-2 border border-stone-300 rounded-md bg-white focus:ring-2 focus:ring-stone-400 outline-none transition-colors shadow-sm">
              <option value="Pendente">Pendente</option>
              <option value="A Ler">A Ler</option>
              <option value="Lido">Lido</option>
              <option value="Abandonado">Abandonado</option>
            </select>
          </div>
          <div>
            <label for="classificacao" class="block text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Avaliação</label>
            <select id="classificacao" name="classificacao" class="w-full px-4 py-2 border border-stone-300 rounded-md bg-white focus:ring-2 focus:ring-stone-400 outline-none transition-colors shadow-sm">
              <option value="-">-</option>
              <option value="1">1 Estrela</option>
              <option value="2">2 Estrelas</option>
              <option value="3">3 Estrelas</option>
              <option value="4">4 Estrelas</option>
              <option value="5">5 Estrelas</option>
            </select>
          </div>
        </div>

        <div>
          <label for="notas" class="block text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Notas / Recensão</label>
          <textarea id="notas" name="notas" rows="3" class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-stone-400 outline-none transition-colors shadow-sm resize-none"></textarea>
        </div>

        <div class="pt-4 border-t border-stone-100 flex justify-end">
          <button type="button" id="btnGravar" onclick="acionarGravacao()" class="w-full sm:w-auto px-8 py-3 bg-stone-900 text-white rounded-md hover:bg-stone-800 transition-colors shadow-md font-medium flex items-center justify-center gap-2">
            <span>Gravar na Coleção</span>
            <svg id="spinnerGravar" class="hidden animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          </button>
        </div>
      </form>
    </section>

  </main>

  <script>
    // =======================================================
    // COLA AQUI O TEU NOVO LINK DO GOOGLE APPS SCRIPT
    // =======================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxRGAxISUlGuDf5evVTArEEWzyEIUWcUgrGvmYkp_HCjnO3Wn_Jye85UllGiPB1079S/exec";

    // Iniciar a aplicação carregando a coleção
    document.addEventListener("DOMContentLoaded", () => {
      carregarColecao();
    });

    // Função para gerir a navegação entre ecrãs
    function mudarSeparador(tab) {
      const secColecao = document.getElementById('sec-colecao');
      const secAdicionar = document.getElementById('sec-adicionar');
      const tabColecao = document.getElementById('tab-colecao');
      const tabAdicionar = document.getElementById('tab-adicionar');

      // Limpar estilos ativos
      const estiloAtivo = ['border-stone-900', 'text-stone-900'];
      const estiloInativo = ['border-transparent', 'text-stone-500'];

      if (tab === 'colecao') {
        secColecao.classList.remove('hidden');
        secAdicionar.classList.add('hidden');
        
        tabColecao.classList.add(...estiloAtivo);
        tabColecao.classList.remove(...estiloInativo);
        tabAdicionar.classList.remove(...estiloAtivo);
        tabAdicionar.classList.add(...estiloInativo);
        
        carregarColecao(); // Refresca a lista sempre que entramos no separador
      } else {
        secColecao.classList.add('hidden');
        secAdicionar.classList.remove('hidden');
        
        tabAdicionar.classList.add(...estiloAtivo);
        tabAdicionar.classList.remove(...estiloInativo);
        tabColecao.classList.remove(...estiloAtivo);
        tabColecao.classList.add(...estiloInativo);
      }
    }

    // Alertas do sistema
    function exibirAlerta(mensagem, tipo) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = mensagem;
      alertBox.className = 'mb-6 p-4 rounded-md text-sm text-center font-medium transition-all duration-300 block';
      if (tipo === 'sucesso') {
        alertBox.classList.add('bg-green-100', 'text-green-800', 'border', 'border-green-200');
      } else {
        alertBox.classList.add('bg-red-100', 'text-red-800', 'border', 'border-red-200');
      }
      setTimeout(() => { alertBox.classList.add('hidden'); }, 4000);
    }

    // ==========================================
    // LÓGICA DA COLEÇÃO (VISUALIZAÇÃO)
    // ==========================================
    async function carregarColecao() {
      const grelha = document.getElementById('grelhaLivros');
      const loading = document.getElementById('loadingGrid');
      const emptyState = document.getElementById('emptyState');
      
      grelha.classList.add('hidden');
      emptyState.classList.add('hidden');
      loading.classList.remove('hidden');
      loading.classList.add('flex');

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ acao: 'listar' })
        });
        
        const livros = await response.json();
        renderizarGrelha(livros);
      } catch (error) {
        console.error(error);
        exibirAlerta('Não foi possível carregar a coleção.', 'erro');
      } finally {
        loading.classList.add('hidden');
        loading.classList.remove('flex');
      }
    }

    function renderizarGrelha(livros) {
      const grelha = document.getElementById('grelhaLivros');
      const emptyState = document.getElementById('emptyState');
      grelha.innerHTML = '';

      if (!livros || livros.length === 0) {
        emptyState.classList.remove('hidden');
        return;
      }

      livros.forEach(livro => {
        // Obter cores para as etiquetas com base no estado
        let corEstado = 'bg-stone-200 text-stone-700';
        if(livro.estado_de_leitura === 'Lido') corEstado = 'bg-green-100 text-green-800 border border-green-200';
        if(livro.estado_de_leitura === 'A Ler') corEstado = 'bg-amber-100 text-amber-800 border border-amber-200';
        if(livro.estado_de_leitura === 'Abandonado') corEstado = 'bg-red-100 text-red-800 border border-red-200';

        const card = document.createElement('div');
        card.className = "bg-white p-6 rounded-xl shadow-sm border border-stone-200 flex flex-col justify-between hover:shadow-md transition-shadow";
        card.innerHTML = `
          <div>
            <div class="flex justify-between items-start mb-3 gap-2">
              <h3 class="text-lg font-semibold text-stone-900 leading-tight">${livro.título || 'Sem Título'}</h3>
              <span class="inline-block px-2 py-1 rounded text-[10px] font-bold uppercase tracking-widest ${corEstado} whitespace-nowrap">
                ${livro.estado_de_leitura || 'S/ Estado'}
              </span>
            </div>
            <p class="text-sm text-stone-500 italic mb-4">${livro.autor || 'Autor Desconhecido'}</p>
            
            <div class="space-y-1 mb-4">
              <p class="text-xs text-stone-600"><span class="font-medium text-stone-400">GÉNERO:</span> ${livro.género || '-'}</p>
              <p class="text-xs text-stone-600"><span class="font-medium text-stone-400">EDITORA:</span> ${livro.editora || '-'}</p>
            </div>
          </div>
          
          <div class="pt-4 border-t border-stone-100 flex justify-between items-center text-sm">
            <div class="text-stone-400 font-medium">${livro.classificação !== '-' ? '⭐'.repeat(parseInt(livro.classificação)) : ''}</div>
            <div class="font-semibold text-stone-700">${livro.preço || ''}</div>
          </div>
        `;
        grelha.appendChild(card);
      });
      
      grelha.classList.remove('hidden');
    }

    // ==========================================
    // LÓGICA DO FORMULÁRIO (GRAVAÇÃO/PESQUISA)
    // ==========================================
    async function acionarPesquisa() {
      const isbnVal = document.getElementById('isbn').value.trim();
      if (!isbnVal) return exibirAlerta('Insere um número ISBN.', 'erro');
      
      document.getElementById('spinnerPesquisa').classList.remove('hidden');
      document.getElementById('btnPesquisar').disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ acao: 'pesquisar', isbn: isbnVal })
        });
        const resultado = await response.json();
        
        if (resultado.titulo) {
          document.getElementById('titulo').value = resultado.titulo;
          document.getElementById('autor').value = resultado.autor;
          document.getElementById('editora').value = resultado.editora;
          document.getElementById('preco').value = resultado.preco;
          exibirAlerta('Dados encontrados!', 'sucesso');
        } else {
          exibirAlerta('Livro não encontrado. Podes preencher manualmente.', 'erro');
        }
      } catch (error) {
        exibirAlerta('Erro ao pesquisar.', 'erro');
      } finally {
        document.getElementById('spinnerPesquisa').classList.add('hidden');
        document.getElementById('btnPesquisar').disabled = false;
      }
    }

    async function acionarGravacao() {
      const isbnVal = document.getElementById('isbn').value.trim();
      const tituloVal = document.getElementById('titulo').value.trim();
      
      if (!tituloVal) return exibirAlerta('O Título do Livro é obrigatório.', 'erro');

      const dadosLivro = {
        isbn: isbnVal.replace(/[-\s]/g, ''),
        titulo: tituloVal,
        autor: document.getElementById('autor').value.trim(),
        editora: document.getElementById('editora').value.trim(),
        preco: document.getElementById('preco').value.trim(),
        genero: document.getElementById('genero').value,
        estado: document.getElementById('estado').value,
        classificacao: document.getElementById('classificacao').value,
        notas: document.getElementById('notas').value.trim()
      };

      document.getElementById('spinnerGravar').classList.remove('hidden');
      document.getElementById('btnGravar').disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ acao: 'gravar', dados: dadosLivro })
        });
        const resposta = await response.json();
        
        if (resposta.sucesso) {
          exibirAlerta(resposta.mensagem, 'sucesso');
          document.getElementById('formLivro').reset();
          document.getElementById('isbn').value = '';
          // Volta ao separador da coleção após gravar com sucesso
          setTimeout(() => { mudarSeparador('colecao'); }, 1500);
        } else {
          exibirAlerta(resposta.mensagem, 'erro');
        }
      } catch (error) {
        exibirAlerta('Erro ao gravar.', 'erro');
      } finally {
        document.getElementById('spinnerGravar').classList.add('hidden');
        document.getElementById('btnGravar').disabled = false;
      }
    }
  </script>
</body>
</html>
