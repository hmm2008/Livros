<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <title>Biblioteca Pessoal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' }, stone: { 50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1', 400: '#a8a29e', 500: '#78716c', 800: '#292524', 900: '#1c1917' } } } }
    }
  </script>
</head>
<body class="bg-stone-50 text-stone-800 antialiased min-h-screen flex flex-col md:flex-row">

  <aside class="w-full md:w-64 bg-brand-700 text-white flex flex-col justify-between shrink-0 shadow-lg md:min-h-screen sticky top-0 md:h-screen overflow-y-auto">
    <div>
      <div class="p-6 border-b border-brand-600/50">
        <h2 class="text-sm font-semibold tracking-wider uppercase text-brand-200">Biblioteca Pessoal</h2>
      </div>
      <nav class="p-4 space-y-1">
        <button onclick="mudarSeparador('inicio')" id="nav-inicio" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-brand-800 text-white transition-colors">Início</button>
        <button onclick="mudarSeparador('colecao')" id="nav-colecao" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-brand-100 hover:bg-brand-600/50 transition-colors">Biblioteca</button>
        <button onclick="mudarSeparador('adicionar')" id="nav-adicionar" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-brand-100 hover:bg-brand-600/50 transition-colors">Adicionar Livro</button>
      </nav>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header class="bg-white border-b border-stone-200 h-16 px-6 flex items-center justify-between sticky top-0 z-20 shadow-sm">
      <h1 class="text-base font-medium text-stone-900">Painel de Controlo</h1>
    </header>

    <main class="p-4 md:p-8 flex-1 max-w-6xl w-full mx-auto">
      <div id="alertBox" class="hidden mb-6 p-4 rounded-lg text-sm text-center font-medium transition-all duration-300"></div>

      <!-- INÍCIO -->
      <section id="sec-inicio" class="block space-y-8">
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
          <div class="bg-white p-4 rounded-xl border border-stone-200 shadow-sm"><span class="text-xs text-stone-500 font-medium">Total</span><p id="stat-total" class="text-xl font-bold text-stone-900 mt-2">0</p></div>
          <div class="bg-white p-4 rounded-xl border border-stone-200 shadow-sm"><span class="text-xs text-stone-500 font-medium">A Ler</span><p id="stat-aler" class="text-xl font-bold text-amber-600 mt-2">0</p></div>
          <div class="bg-white p-4 rounded-xl border border-stone-200 shadow-sm"><span class="text-xs text-stone-500 font-medium">Lidos</span><p id="stat-lidos" class="text-xl font-bold text-purple-600 mt-2">0</p></div>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-stone-700 mb-4">Adicionados Recentemente</h3>
          <div id="grelhaRecentes" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>
        </div>
      </section>

      <!-- BIBLIOTECA -->
      <section id="sec-colecao" class="hidden space-y-6">
        <div id="loadingGrid" class="py-12 flex flex-col items-center justify-center text-stone-400">A carregar base de dados...</div>
        <div id="grelhaLivros" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </section>

      <!-- ADICIONAR LIVRO -->
      <section id="sec-adicionar" class="hidden bg-white rounded-xl shadow-sm border border-stone-200 p-6 sm:p-8 space-y-6 max-w-4xl mx-auto">
        <div class="p-4 bg-stone-50 rounded-xl border border-stone-200 space-y-3">
          <span class="text-xs font-semibold text-stone-700 uppercase tracking-wider">Pesquisa Automática</span>
          <div class="flex flex-col sm:flex-row gap-2">
            <input type="text" id="isbn_pesquisa" placeholder="Ex: 9789720000000" class="w-full px-3.5 py-2 bg-white border border-stone-300 rounded-lg text-sm outline-none">
            <button type="button" id="btnPesquisar" onclick="acionarPesquisa()" class="px-5 py-2 bg-stone-800 text-white rounded-lg hover:bg-stone-700 text-sm font-medium">Pesquisar ISBN</button>
          </div>
        </div>

        <form id="formLivro" class="space-y-4 pt-2">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Título *</label><input type="text" id="titulo" required class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Subtítulo</label><input type="text" id="subtitulo" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Autor(es)</label><input type="text" id="autores" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Tradutor</label><input type="text" id="tradutor" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Ilustrador</label><input type="text" id="ilustrador" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Editora</label><input type="text" id="editora" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Local Edição</label><input type="text" id="local_edicao" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Ano</label><input type="text" id="ano" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Páginas</label><input type="text" id="paginas" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Coleção</label><input type="text" id="colecao" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Volume</label><input type="text" id="volume" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Nº Edição</label><input type="text" id="edicao" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Idioma</label><input type="text" id="idioma" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">ISBN 13</label><input type="text" id="isbn13" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">ISBN 10</label><input type="text" id="isbn10" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Categorias/Géneros</label><input type="text" id="categorias" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Peso (g)</label><input type="text" id="peso" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Altura (cm)</label><input type="text" id="altura" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Largura (cm)</label><input type="text" id="largura" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Espessura (cm)</label><input type="text" id="espessura" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"></div>
          </div>
          <div class="p-4 bg-stone-50 rounded-xl border border-stone-200 flex items-center gap-4">
            <div class="w-20 h-28 bg-white border border-stone-300 rounded-lg overflow-hidden flex items-center justify-center shrink-0">
              <img id="img_capa" src="" class="hidden w-full h-full object-cover">
              <span id="txt_capa" class="text-stone-400 text-[10px]">Sem Capa</span>
            </div>
            <div class="w-full"><label class="block text-[10px] font-semibold text-stone-700 uppercase">URL Imagem Capa</label><input type="url" id="capa" oninput="atualizarCapa('capa', 'img_capa', 'txt_capa')" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-xs bg-white"></div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-4">
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Disponibilidade</label><select id="preco" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"><option value="Disponível">Disponível</option><option value="Emprestado">Emprestado</option></select></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Estado de Leitura</label><select id="estado" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"><option value="Pendente">Pendente</option><option value="A Ler">A Ler</option><option value="Lido">Lido</option><option value="Abandonado">Abandonado</option></select></div>
            <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1">Avaliação</label><select id="classificacao" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"><option value="-">-</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></div>
          </div>
          <div><label class="block text-[10px] font-semibold text-stone-700 uppercase mb-1 mt-2">Descrição / Notas</label><textarea id="descricao" rows="3" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm resize-none"></textarea></div>
          <div class="pt-6 border-t border-stone-200 flex justify-end">
            <button type="button" id="btnGravar" onclick="acionarGravacao()" class="px-8 py-3 bg-brand-600 text-white rounded-xl hover:bg-brand-700 text-sm font-semibold">Gravar na Coleção</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script>
    // ==========================================================
    // SUBSTITUI A LINHA ABAIXO COM O TEU URL
    // ==========================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxuR7C7bjVRxyzxnwfkFNexVgvBapC1q1yMp1g_ajG7IyuKy7zvOgbhsvnvgIfbFQop/exec";
    
    let colecaoGlobal = [];

    document.addEventListener("DOMContentLoaded", () => { carregarColecao(); });

    function atualizarCapa(inputId, imgId, txtId) {
      const url = document.getElementById(inputId).value.trim();
      const img = document.getElementById(imgId);
      const txt = document.getElementById(txtId);
      if (url) { img.src = url; img.classList.remove('hidden'); txt.classList.add('hidden'); } 
      else { img.src = ''; img.classList.add('hidden'); txt.classList.remove('hidden'); }
    }

    function mudarSeparador(tab) {
      ['inicio', 'colecao', 'adicionar'].forEach(a => {
        const sec = document.getElementById('sec-' + a);
        const nav = document.getElementById('nav-' + a);
        if (a === tab) {
          sec.classList.remove('hidden');
          if(nav) nav.className = "w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-brand-800 text-white";
        } else {
          sec.classList.add('hidden');
          if(nav) nav.className = "w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-brand-100 hover:bg-brand-600/50";
        }
      });
      if(tab === 'colecao' || tab === 'inicio') carregarColecao();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function exibirAlerta(mensagem, tipo) {
      const a = document.getElementById('alertBox');
      a.textContent = mensagem;
      a.className = `mb-6 p-4 rounded-lg text-sm text-center font-medium block border ${tipo === 'sucesso' ? 'bg-emerald-50 text-emerald-800 border-emerald-200' : 'bg-rose-50 text-rose-800 border-rose-200'}`;
      setTimeout(() => { a.classList.add('hidden'); }, 4000);
    }

    async function chamadorAPI(acao, payload = {}) {
      if(API_URL.includes("COLA_AQUI")) { exibirAlerta("Falta configurar o URL do Google Script no HTML.", "erro"); return null; }
      try {
        const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ acao, ...payload }) });
        const data = await response.json();
        return data;
      } catch(e) {
        exibirAlerta("Erro de ligação. O link pode estar errado ou o Apps Script precisa de uma 'Nova Versão'.", "erro");
        return null;
      }
    }

    async function carregarColecao() {
      document.getElementById('loadingGrid').classList.remove('hidden');
      document.getElementById('grelhaLivros').classList.add('hidden');
      const data = await chamadorAPI('listar');
      if (data && Array.isArray(data)) {
        colecaoGlobal = data;
        atualizarDashboardEstatisticas(colecaoGlobal);
        renderizarGrelhaCompleta(colecaoGlobal);
      }
      document.getElementById('loadingGrid').classList.add('hidden');
    }

    function atualizarDashboardEstatisticas(livros) {
      document.getElementById('stat-total').textContent = livros.length;
      document.getElementById('stat-aler').textContent = livros.filter(l => l.estado_de_leitura === 'A Ler').length;
      document.getElementById('stat-lidos').textContent = livros.filter(l => l.estado_de_leitura === 'Lido').length;

      const recentes = livros.slice(0, 5);
      const containerRecentes = document.getElementById('grelhaRecentes');
      containerRecentes.innerHTML = '';
      recentes.forEach((livro) => {
        const imgH = livro.capa ? `<img src="${livro.capa}" class="w-full h-full object-cover">` : `<span class="text-[10px] text-stone-400 p-2 text-center">S/ Capa</span>`;
        containerRecentes.innerHTML += `
          <div class="bg-white p-3 rounded-xl border border-stone-200 shadow-sm">
            <div class="w-full aspect-[2/3] bg-stone-100 rounded-lg overflow-hidden mb-2">${imgH}</div>
            <h4 class="text-xs font-semibold text-stone-900 truncate">${livro.titulo}</h4>
          </div>
        `;
      });
    }

    function renderizarGrelhaCompleta(livros) {
      const grelha = document.getElementById('grelhaLivros');
      grelha.innerHTML = '';
      livros.forEach((livro) => {
        const imgH = livro.capa ? `<img src="${livro.capa}" class="w-full h-full object-cover">` : `<span class="text-stone-400 text-[10px] text-center">S/ Capa</span>`;
        grelha.innerHTML += `
          <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200 flex gap-4">
            <div class="w-20 shrink-0 aspect-[2/3] bg-stone-100 rounded-lg overflow-hidden border border-stone-200">${imgH}</div>
            <div class="flex flex-col justify-center overflow-hidden">
              <h3 class="text-sm font-semibold text-stone-900 truncate">${livro.titulo || 'Sem Título'}</h3>
              <p class="text-xs text-stone-500 truncate mb-1">${livro.autores || livro.autor || 'Desconhecido'}</p>
              <span class="inline-block px-2 py-0.5 rounded text-[9px] font-bold uppercase border bg-stone-100 w-fit">${livro.estado_de_leitura || 'Pendente'}</span>
            </div>
          </div>
        `;
      });
      grelha.classList.remove('hidden');
    }

    async function acionarPesquisa() {
      const isbnVal = document.getElementById('isbn_pesquisa').value.trim();
      if (!isbnVal) return exibirAlerta('Insere um ISBN válido.', 'erro');
      
      document.getElementById('btnPesquisar').textContent = "A pesquisar...";
      const livro = await chamadorAPI('pesquisar', { isbn: isbnVal });
      
      if (livro && livro.titulo) {
        const campos = ['titulo','subtitulo','autores','tradutor','ilustrador','colecao','volume','edicao','editora','local_edicao','ano','paginas','idioma','isbn13','isbn10','categorias','peso','altura','largura','espessura','capa','descricao'];
        campos.forEach(id => { if (document.getElementById(id)) document.getElementById(id).value = livro[id] || ''; });
        atualizarCapa('capa', 'img_capa', 'txt_capa');
        exibirAlerta('Obra encontrada online!', 'sucesso');
      } else if (livro) {
        exibirAlerta('Livro não encontrado automaticamente. Preenche manualmente.', 'erro');
        if(isbnVal.length === 13) document.getElementById('isbn13').value = isbnVal;
      }
      document.getElementById('btnPesquisar').textContent = "Pesquisar ISBN";
    }

    async function acionarGravacao() {
      if (!document.getElementById('titulo').value.trim()) return exibirAlerta('O Título é obrigatório.', 'erro');
      const chaves = ['titulo','subtitulo','autores','tradutor','ilustrador','editora','local_edicao','ano','paginas','colecao','volume','edicao','idioma','isbn13','isbn10','categorias','peso','altura','largura','espessura','capa','descricao'];
      const dados = {};
      chaves.forEach(id => { if(document.getElementById(id)) dados[id] = document.getElementById(id).value.trim(); });
      
      dados.preco = document.getElementById('preco').value; 
      dados.estado_de_leitura = document.getElementById('estado').value;
      dados.classificacao = document.getElementById('classificacao').value;
      dados.isbn = (dados.isbn13 || dados.isbn10 || document.getElementById('isbn_pesquisa').value).replace(/[-\s]/g, '');

      document.getElementById('btnGravar').textContent = "A gravar...";
      const r = await chamadorAPI('gravar', { dados });
      if (r && r.sucesso) {
        exibirAlerta(r.mensagem, 'sucesso');
        document.getElementById('formLivro').reset();
        atualizarCapa('capa', 'img_capa', 'txt_capa');
        setTimeout(() => mudarSeparador('inicio'), 1000);
      } else if (r) {
        exibirAlerta(r.mensagem, 'erro');
      }
      document.getElementById('btnGravar').textContent = "Gravar na Coleção";
    }
  </script>
</body>
</html>
