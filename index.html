<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Livros</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { stone: { 50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1', 400: '#a8a29e', 500: '#78716c', 800: '#292524', 900: '#1c1917' } } } } }
  </script>
</head>
<body class="bg-stone-50 text-stone-800 antialiased min-h-screen relative">

  <nav class="bg-white border-b border-stone-200 sticky top-0 z-10 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <h1 class="text-lg sm:text-xl font-medium text-stone-900 tracking-wide">CATÁLOGO DE LIVROS</h1>
        <div class="flex space-x-2 sm:space-x-4">
          <button onclick="mudarSeparador('colecao')" id="tab-colecao" class="px-3 py-2 text-sm sm:text-base font-medium border-b-2 border-stone-900 text-stone-900 transition-colors">A Minha Coleção</button>
          <button onclick="mudarSeparador('adicionar')" id="tab-adicionar" class="px-3 py-2 text-sm sm:text-base font-medium border-b-2 border-transparent text-stone-500 hover:text-stone-700 transition-colors">Novo Registo</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div id="alertBox" class="hidden mb-6 p-4 rounded-md text-sm text-center font-medium transition-all duration-300"></div>

    <!-- SEPARADOR: Coleção -->
    <section id="sec-colecao" class="block">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-light text-stone-800">Livros Registados</h2>
        <button onclick="carregarColecao()" class="p-2 text-stone-500 hover:text-stone-900 transition-colors" title="Atualizar">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
      </div>
      
      <div id="loadingGrid" class="py-12 flex flex-col items-center justify-center text-stone-400">
        <svg class="animate-spin h-8 w-8 mb-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <p>A sincronizar com a base de dados...</p>
      </div>

      <div id="grelhaLivros" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6"></div>
      
      <div id="emptyState" class="hidden py-12 text-center border-2 border-dashed border-stone-200 rounded-xl">
        <p class="text-stone-500 mb-4">Ainda não tens livros na tua coleção.</p>
        <button onclick="mudarSeparador('adicionar')" class="text-stone-900 font-medium hover:underline">Adicionar o primeiro livro</button>
      </div>
    </section>

    <!-- SEPARADOR: Adicionar -->
    <section id="sec-adicionar" class="hidden max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-stone-200 p-6 sm:p-8">
      
      <div class="mb-8 p-5 bg-stone-50 rounded-lg border border-stone-100 flex flex-col sm:flex-row gap-4 items-end">
        <div class="w-full">
          <label class="block text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Código ISBN</label>
          <input type="text" id="isbn" placeholder="Ex: 9789720000000" class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-stone-400 outline-none">
        </div>
        <button type="button" id="btnPesquisar" onclick="acionarPesquisa()" class="w-full sm:w-auto px-6 py-2 bg-stone-800 text-white rounded-md hover:bg-stone-700 font-medium flex justify-center gap-2">
          <span>Pesquisar</span>
          <svg id="spinnerPesquisa" class="hidden animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
      </div>

      <form id="formLivro" class="flex flex-col md:flex-row gap-8">
        <!-- COLUNA ESQUERDA: Capa -->
        <div class="w-full md:w-1/4 flex flex-col items-center shrink-0">
          <div class="w-36 h-52 bg-stone-100 border border-stone-200 rounded-md overflow-hidden flex items-center justify-center shadow-sm relative">
            <img id="img_capa" src="" class="hidden w-full h-full object-cover">
            <span id="txt_capa" class="text-stone-400 text-xs text-center p-2 font-medium">Sem<br>Capa</span>
          </div>
          <div class="w-full mt-4">
            <label class="block text-[10px] font-semibold text-stone-500 uppercase text-center mb-1">URL da Imagem (Opcional)</label>
            <input type="url" id="capa" placeholder="https://..." oninput="atualizarCapa('capa', 'img_capa', 'txt_capa')" class="w-full text-xs px-2 py-2 border border-stone-300 rounded-md outline-none focus:border-stone-500 text-center">
          </div>
        </div>

        <!-- COLUNA DIREITA: Dados -->
        <div class="w-full md:w-3/4 space-y-6">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="sm:col-span-2"><label class="block text-xs font-semibold text-stone-500 uppercase mb-2">Título do Livro *</label><input type="text" id="titulo" required class="w-full px-4 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-stone-400 outline-none"></div>
            <div><label class="block text-xs font-semibold text-stone-500 uppercase mb-2">Autor</label><input type="text" id="autor" class="w-full px-4 py-2 border border-stone-300 rounded-md outline-none focus:ring-2 focus:ring-stone-400"></div>
            <div><label class="block text-xs font-semibold text-stone-500 uppercase mb-2">Editora</label><input type="text" id="editora" class="w-full px-4 py-2 border border-stone-300 rounded-md outline-none focus:ring-2 focus:ring-stone-400"></div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div><label class="block text-xs font-semibold text-stone-500 uppercase mb-2">Preço</label><input type="text" id="preco" class="w-full px-4 py-2 border border-stone-300 rounded-md"></div>
            <div><label class="block text-xs font-semibold text-stone-500 uppercase mb-2">Género</label><select id="genero" class="w-full px-4 py-2 border border-stone-300 rounded-md bg-white"><option value="">Selecione...</option><option value="Ficção">Ficção</option><option value="Biografia">Biografia</option><option value="Técnico">Técnico</option><option value="História">História</option><option value="Romance">Romance</option><option value="Outro">Outro</option></select></div>
            <div><label class="block text-xs font-semibold text-stone-500 uppercase mb-2">Estado</label><select id="estado" class="w-full px-4 py-2 border border-stone-300 rounded-md bg-white"><option value="Pendente">Pendente</option><option value="A Ler">A Ler</option><option value="Lido">Lido</option><option value="Abandonado">Abandonado</option></select></div>
            <div><label class="block text-xs font-semibold text-stone-500 uppercase mb-2">Avaliação</label><select id="classificacao" class="w-full px-4 py-2 border border-stone-300 rounded-md bg-white"><option value="-">-</option><option value="1">1 Estrela</option><option value="2">2 Estrelas</option><option value="3">3 Estrelas</option><option value="4">4 Estrelas</option><option value="5">5 Estrelas</option></select></div>
          </div>
          <div><label class="block text-xs font-semibold text-stone-500 uppercase mb-2">Notas / Recensão</label><textarea id="notas" rows="3" class="w-full px-4 py-2 border border-stone-300 rounded-md resize-none outline-none focus:ring-2 focus:ring-stone-400"></textarea></div>
          <div class="pt-4 flex justify-end">
            <button type="button" id="btnGravar" onclick="acionarGravacao()" class="px-8 py-3 bg-stone-900 text-white rounded-md hover:bg-stone-800 transition-colors font-medium flex gap-2">
              <span>Gravar na Coleção</span>
              <svg id="spinnerGravar" class="hidden animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
          </div>
        </div>
      </form>
    </section>
  </main>

  <!-- OVERLAY E MODAIS -->
  <div id="modalOverlay" class="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-40 hidden items-center justify-center p-4">
    <!-- MODAL APAGAR -->
    <div id="modalApagar" class="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 hidden flex-col">
      <h3 class="text-lg font-semibold text-stone-900 mb-2">Apagar Livro</h3>
      <p class="text-sm text-stone-500 mb-6">Tem a certeza que deseja remover <strong id="apagarTitulo"></strong>?</p>
      <div class="flex justify-end gap-3">
        <button onclick="fecharModais()" class="px-4 py-2 text-stone-600 hover:bg-stone-100 rounded-md">Cancelar</button>
        <button id="btnConfirmarApagar" onclick="confirmarApagar()" class="px-4 py-2 bg-red-600 text-white rounded-md flex gap-2"><span>Apagar</span></button>
      </div>
    </div>

    <!-- MODAL EDITAR -->
    <div id="modalEditar" class="bg-white rounded-xl shadow-xl max-w-4xl w-full p-6 sm:p-8 hidden flex-col max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-lg font-semibold text-stone-900">Editar Livro</h3>
        <button onclick="fecharModais()" class="text-stone-400 hover:text-stone-800"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
      </div>
      
      <form id="formEditar" class="flex flex-col md:flex-row gap-6">
        <!-- Coluna Esquerda Edição (Capa) -->
        <div class="w-full md:w-1/4 flex flex-col items-center shrink-0">
          <div class="w-32 h-48 bg-stone-100 border border-stone-200 rounded-md overflow-hidden flex items-center justify-center shadow-sm relative">
            <img id="ed_img_capa" src="" class="hidden w-full h-full object-cover">
            <span id="ed_txt_capa" class="text-stone-400 text-xs text-center p-2 font-medium">Sem<br>Capa</span>
          </div>
          <input type="url" id="ed_capa" placeholder="URL da Capa" oninput="atualizarCapa('ed_capa', 'ed_img_capa', 'ed_txt_capa')" class="mt-4 w-full text-xs px-2 py-2 border border-stone-300 rounded-md outline-none text-center">
        </div>
        
        <!-- Coluna Direita Edição -->
        <div class="w-full md:w-3/4 space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div><label class="block text-[10px] font-semibold text-stone-500 uppercase">ISBN</label><input type="text" id="ed_isbn" class="w-full px-3 py-2 border border-stone-300 rounded-md"></div>
            <div><label class="block text-[10px] font-semibold text-stone-500 uppercase">Título *</label><input type="text" id="ed_titulo" required class="w-full px-3 py-2 border border-stone-300 rounded-md"></div>
            <div><label class="block text-[10px] font-semibold text-stone-500 uppercase">Autor</label><input type="text" id="ed_autor" class="w-full px-3 py-2 border border-stone-300 rounded-md"></div>
            <div><label class="block text-[10px] font-semibold text-stone-500 uppercase">Editora</label><input type="text" id="ed_editora" class="w-full px-3 py-2 border border-stone-300 rounded-md"></div>
          </div>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
            <div><label class="block text-[10px] font-semibold text-stone-500 uppercase">Preço</label><input type="text" id="ed_preco" class="w-full px-3 py-2 border border-stone-300 rounded-md"></div>
            <div><label class="block text-[10px] font-semibold text-stone-500 uppercase">Género</label><select id="ed_genero" class="w-full px-3 py-2 border border-stone-300 rounded-md"><option value="Ficção">Ficção</option><option value="Biografia">Biografia</option><option value="Técnico">Técnico</option><option value="História">História</option><option value="Romance">Romance</option><option value="Outro">Outro</option></select></div>
            <div><label class="block text-[10px] font-semibold text-stone-500 uppercase">Estado</label><select id="ed_estado" class="w-full px-3 py-2 border border-stone-300 rounded-md"><option value="Pendente">Pendente</option><option value="A Ler">A Ler</option><option value="Lido">Lido</option><option value="Abandonado">Abandonado</option></select></div>
            <div><label class="block text-[10px] font-semibold text-stone-500 uppercase">Avaliação</label><select id="ed_classificacao" class="w-full px-3 py-2 border border-stone-300 rounded-md"><option value="-">-</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></div>
          </div>
          <div><label class="block text-[10px] font-semibold text-stone-500 uppercase">Notas</label><textarea id="ed_notas" rows="2" class="w-full px-3 py-2 border border-stone-300 rounded-md resize-none"></textarea></div>
          
          <div class="pt-2 flex justify-end gap-3">
            <button type="button" onclick="fecharModais()" class="px-4 py-2 text-stone-600 hover:bg-stone-100 rounded-md font-medium">Cancelar</button>
            <button type="button" id="btnConfirmarEditar" onclick="confirmarEdicao()" class="px-6 py-2 bg-stone-900 text-white rounded-md font-medium">Guardar Alterações</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    // COLOCA O TEU LINK AQUI
    const API_URL = "https://script.google.com/macros/s/AKfycbxdGDgnDYQfCRydUXeojJsxdh-y2iT6rWGyaJh6x1ZD99-9Q-8FmIzl0Y7nBJT6FH0l/exec";
    
    let colecaoAtual = [];
    let linhaAtiva = null;

    document.addEventListener("DOMContentLoaded", () => { carregarColecao(); });

    // Pré-visualização da Capa ao colar o Link
    function atualizarCapa(inputId, imgId, txtId) {
      const url = document.getElementById(inputId).value.trim();
      const img = document.getElementById(imgId);
      const txt = document.getElementById(txtId);
      if (url) {
        img.src = url; img.classList.remove('hidden'); txt.classList.add('hidden');
      } else {
        img.src = ''; img.classList.add('hidden'); txt.classList.remove('hidden');
      }
    }

    function mudarSeparador(tab) {
      const tabs = { colecao: { sec: 'sec-colecao', btn: 'tab-colecao' }, adicionar: { sec: 'sec-adicionar', btn: 'tab-adicionar' } };
      for (const [key, val] of Object.entries(tabs)) {
        if (key === tab) {
          document.getElementById(val.sec).classList.remove('hidden');
          document.getElementById(val.btn).className = "px-3 py-2 text-sm sm:text-base font-medium border-b-2 border-stone-900 text-stone-900";
          if (key === 'colecao') carregarColecao();
        } else {
          document.getElementById(val.sec).classList.add('hidden');
          document.getElementById(val.btn).className = "px-3 py-2 text-sm sm:text-base font-medium border-b-2 border-transparent text-stone-500 hover:text-stone-700";
        }
      }
    }

    function exibirAlerta(mensagem, tipo) {
      const a = document.getElementById('alertBox');
      a.textContent = mensagem;
      a.className = `mb-6 p-4 rounded-md text-sm text-center font-medium transition-all duration-300 block border ${tipo === 'sucesso' ? 'bg-green-100 text-green-800 border-green-200' : 'bg-red-100 text-red-800 border-red-200'}`;
      setTimeout(() => { a.classList.add('hidden'); }, 4000);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function chamadorAPI(acao, payload = {}) {
      const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ acao, ...payload }) });
      return await response.json();
    }

    async function carregarColecao() {
      document.getElementById('grelhaLivros').classList.add('hidden');
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('loadingGrid').classList.remove('hidden');
      document.getElementById('loadingGrid').classList.add('flex');
      try {
        colecaoAtual = await chamadorAPI('listar');
        renderizarGrelha();
      } catch (error) { exibirAlerta('Falha ao carregar a coleção.', 'erro'); }
      finally { document.getElementById('loadingGrid').classList.add('hidden'); document.getElementById('loadingGrid').classList.remove('flex'); }
    }

    function renderizarGrelha() {
      const grelha = document.getElementById('grelhaLivros');
      grelha.innerHTML = '';
      if (!colecaoAtual || colecaoAtual.length === 0) return document.getElementById('emptyState').classList.remove('hidden');

      colecaoAtual.forEach((livro, index) => {
        let corEstado = 'bg-stone-200 text-stone-700';
        if(livro.estado_de_leitura === 'Lido') corEstado = 'bg-green-100 text-green-800 border-green-200';
        if(livro.estado_de_leitura === 'A Ler') corEstado = 'bg-amber-100 text-amber-800 border-amber-200';
        if(livro.estado_de_leitura === 'Abandonado') corEstado = 'bg-red-100 text-red-800 border-red-200';

        const imagemHtml = livro.capa 
          ? `<img src="${livro.capa}" class="w-full h-full object-cover">` 
          : `<span class="text-stone-400 text-[10px] text-center p-1">S/ Capa</span>`;

        grelha.innerHTML += `
          <div class="bg-white p-5 rounded-xl shadow-sm border border-stone-200 flex gap-4 hover:shadow-md transition-shadow">
            <div class="w-20 sm:w-28 flex-shrink-0 h-auto aspect-[2/3] bg-stone-100 rounded-md overflow-hidden border border-stone-200 flex items-center justify-center">
              ${imagemHtml}
            </div>
            <div class="flex flex-col justify-between flex-grow min-w-0 py-1">
              <div>
                <div class="flex justify-between items-start mb-2 gap-2">
                  <h3 class="text-base sm:text-lg font-semibold text-stone-900 leading-tight truncate">${livro.titulo || 'Sem Título'}</h3>
                  <span class="px-2 py-1 rounded text-[9px] font-bold uppercase tracking-wider ${corEstado} whitespace-nowrap border">${livro.estado_de_leitura || 'S/ Estado'}</span>
                </div>
                <p class="text-xs text-stone-500 italic mb-3 truncate">${livro.autor || 'Autor Desconhecido'}</p>
                <div class="flex gap-4 text-[11px] text-stone-600">
                  <p><span class="font-medium text-stone-400">GÉNERO:</span> ${livro.genero || '-'}</p>
                  <p class="truncate"><span class="font-medium text-stone-400">EDITORA:</span> ${livro.editora || '-'}</p>
                </div>
              </div>
              <div class="pt-3 border-t border-stone-100 flex justify-between items-center mt-3">
                <div class="flex gap-2">
                  <button onclick="abrirModalEditar(${index})" class="text-stone-400 hover:text-blue-600 transition-colors" title="Editar"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
                  <button onclick="abrirModalApagar(${index})" class="text-stone-400 hover:text-red-600 transition-colors" title="Apagar"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                </div>
                <div class="font-semibold text-stone-700 text-sm">${livro.preco || ''}</div>
              </div>
            </div>
          </div>
        `;
      });
      grelha.classList.remove('hidden');
    }

    function fecharModais() {
      ['modalOverlay', 'modalApagar', 'modalEditar'].forEach(id => {
        document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex');
      });
      linhaAtiva = null;
    }

    function abrirModalApagar(index) {
      const livro = colecaoAtual[index]; linhaAtiva = livro._linha;
      document.getElementById('apagarTitulo').textContent = livro.titulo;
      document.getElementById('modalOverlay').classList.replace('hidden', 'flex');
      document.getElementById('modalApagar').classList.replace('hidden', 'flex');
    }

    async function confirmarApagar() {
      try {
        const res = await chamadorAPI('apagar', { linha: linhaAtiva });
        if (res.sucesso) { exibirAlerta(res.mensagem, 'sucesso'); carregarColecao(); } else exibirAlerta(res.mensagem, 'erro');
      } catch (e) { exibirAlerta('Erro ao apagar.', 'erro'); }
      finally { fecharModais(); }
    }

    function abrirModalEditar(index) {
      const livro = colecaoAtual[index]; linhaAtiva = livro._linha;
      ['isbn', 'titulo', 'autor', 'editora', 'preco', 'capa', 'notas'].forEach(k => document.getElementById(`ed_${k}`).value = livro[k] || '');
      ['genero', 'estado', 'classificacao'].forEach(k => document.getElementById(`ed_${k}`).value = livro[k] || (k==='classificacao'?'-':(k==='estado'?'Pendente':'')));
      atualizarCapa('ed_capa', 'ed_img_capa', 'ed_txt_capa');
      document.getElementById('modalOverlay').classList.replace('hidden', 'flex');
      document.getElementById('modalEditar').classList.replace('hidden', 'flex');
    }

    async function confirmarEdicao() {
      const tituloVal = document.getElementById('ed_titulo').value.trim();
      if (!tituloVal) return alert('O título é obrigatório.');
      const dadosLivro = ['isbn','titulo','autor','editora','preco','capa','genero','estado','classificacao','notas'].reduce((obj, id) => {
        obj[id] = document.getElementById(`ed_${id}`).value.trim(); return obj;
      }, {});
      dadosLivro.isbn = dadosLivro.isbn.replace(/[-\s]/g, '');

      try {
        const res = await chamadorAPI('editar', { linha: linhaAtiva, dados: dadosLivro });
        if (res.sucesso) { exibirAlerta(res.mensagem, 'sucesso'); carregarColecao(); } else exibirAlerta(res.mensagem, 'erro');
      } catch (e) { exibirAlerta('Erro ao editar.', 'erro'); }
      finally { fecharModais(); }
    }

    async function acionarPesquisa() {
      const isbnVal = document.getElementById('isbn').value.trim();
      if (!isbnVal) return exibirAlerta('Insere um ISBN.', 'erro');
      document.getElementById('spinnerPesquisa').classList.remove('hidden');
      try {
        const r = await chamadorAPI('pesquisar', { isbn: isbnVal });
        if (r.titulo) {
          ['titulo', 'autor', 'editora', 'preco', 'capa'].forEach(id => document.getElementById(id).value = r[id] || '');
          atualizarCapa('capa', 'img_capa', 'txt_capa');
          exibirAlerta('Dados encontrados!', 'sucesso');
        } else exibirAlerta('Não encontrado. Preenche manualmente.', 'erro');
      } catch (e) { exibirAlerta('Erro na pesquisa.', 'erro'); }
      finally { document.getElementById('spinnerPesquisa').classList.add('hidden'); }
    }

    async function acionarGravacao() {
      if (!document.getElementById('titulo').value.trim()) return exibirAlerta('Título obrigatório.', 'erro');
      const dados = ['isbn','titulo','autor','editora','preco','capa','genero','estado','classificacao','notas'].reduce((obj, id) => {
        obj[id] = document.getElementById(id).value.trim(); return obj;
      }, {});
      dados.isbn = dados.isbn.replace(/[-\s]/g, '');

      document.getElementById('spinnerGravar').classList.remove('hidden');
      try {
        const r = await chamadorAPI('gravar', { dados });
        if (r.sucesso) {
          exibirAlerta(r.mensagem, 'sucesso');
          document.getElementById('formLivro').reset();
          atualizarCapa('capa', 'img_capa', 'txt_capa'); // Limpa a imagem
          setTimeout(() => mudarSeparador('colecao'), 1000);
        } else exibirAlerta(r.mensagem, 'erro');
      } catch (e) { exibirAlerta('Erro ao gravar.', 'erro'); }
      finally { document.getElementById('spinnerGravar').classList.add('hidden'); }
    }
  </script>
</body>
